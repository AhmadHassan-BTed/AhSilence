name: Bug Report
description: Report a bug or unexpected behavior
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to report a bug!

  - type: input
    id: device
    attributes:
      label: Device
      description: e.g., Pixel 7, Samsung Galaxy S24
      placeholder: "Pixel 7"
    validations:
      required: true

  - type: input
    id: android-version
    attributes:
      label: Android Version
      placeholder: "Android 14 (API 34)"
    validations:
      required: true

  - type: textarea
    id: description
    attributes:
      label: Bug Description
      description: A clear and concise description of the bug.
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: Steps to Reproduce
      value: |
        1.
        2.
        3.
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected Behavior
    validations:
      required: true

  - type: textarea
    id: logs
    attributes:
      label: Logcat Output (if applicable)
      render: shell
